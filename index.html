<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBridge PH — AI Career Ecosystem</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:  { DEFAULT: '#1F4E79', 50: '#EEF4FB', 100: '#D5E6F5', 600: '#2563AB', 700: '#1A4268', 800: '#163856', dark: '#122F48' },
            teal:  { DEFAULT: '#1D9E75', 50: '#E8F8F2', 100: '#C5EEE0', 600: '#17865F', 700: '#116649' },
            sky:   { DEFAULT: '#2E75B6', 50: '#EAF3FB', 100: '#C5DDEE' },
          },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F5F7FA; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }

    @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.3); } }
    @keyframes shimmer { from { background-position: -600px 0; } to { background-position: 600px 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
    .fade-in { animation: fadeIn .3s ease both; }

    .card-hover { transition: transform .18s ease, box-shadow .18s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(31,78,121,.1); }

    .btn { transition: filter .15s ease, transform .1s ease; }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: scale(.97); }

    .sidebar-item { transition: background .15s, color .15s; }
    .sidebar-item:hover { background: rgba(255,255,255,.08); }

    .credly-badge { background: linear-gradient(135deg,#FF6B2B 0%,#FF8C42 100%); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

  sky:     '#2E75B6',
  skyLt:   '#EAF3FB',
  warn:    '#F59E0B',
  warnLt:  '#FFFBEB',
  danger:  '#EF4444',
  gray:    '#6B7280',
  grayLt:  '#F3F4F6',

  Check:    <svg viewBox="0 0 16 16" fill="currentColor" className="w-4 h-4"><path fillRule="evenodd" d="M12.416 3.376a.75.75 0 01.208 1.04l-5 7.5a.75.75 0 01-1.154.114l-3-3a.75.75 0 011.06-1.06l2.353 2.353 4.493-6.74a.75.75 0 011.04-.207z" clipRule="evenodd"/></svg>,

  Link:     <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4"><path fillRule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clipRule="evenodd"/></svg>,

  Spark:    <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4"><path fillRule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zM12 2a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z" clipRule="evenodd"/></svg>,

  Chevron:  <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd"/></svg>,

/* ══════════════════════ PRIMITIVE COMPONENTS ══════════════════════ */

const Avatar = ({ initials = 'MR', size = 40, bg = C.navy, textSize = 14 }) => (
  <div style={{ width: size, height: size, borderRadius: '50%', background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: textSize, flexShrink: 0, letterSpacing: '.5px' }}>
    {initials}
  </div>
);

const Pill = ({ children, color, bg, size = 'sm' }) => (
  <span style={{ color, background: bg, borderRadius: 99, padding: size === 'xs' ? '2px 8px' : '3px 10px', fontSize: size === 'xs' ? 10 : 11, fontWeight: 700, letterSpacing: '.3px', whiteSpace: 'nowrap', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
    {children}
  </span>
);

const Bar = ({ pct, color = C.teal, height = 8, bg = '#E5E7EB', radius = 99 }) => (
  <div style={{ width: '100%', height, background: bg, borderRadius: radius, overflow: 'hidden' }}>
    <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: radius, transition: 'width .6s cubic-bezier(.4,0,.2,1)' }} />
  </div>
);

const Stars = ({ n, total = 5, color = C.warn }) =>
  Array.from({ length: total }, (_, i) => (
    <span key={i} style={{ color: i < n ? color : '#D1D5DB' }}>{Ico.Star}</span>
  ));

const CredlyBadge = () => (
  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: 'linear-gradient(135deg,#FF6B2B,#FF8C42)', color: '#fff', borderRadius: 6, padding: '2px 8px', fontSize: 10, fontWeight: 800, letterSpacing: '.4px' }}>
    ✦ CREDLY VERIFIED
  </span>
);

/* Circular SVG progress ring */
const Ring = ({ pct, size = 120, stroke = 9, color = C.teal, bg = '#E5E7EB', children }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct / 100);
  return (
    <div style={{ position: 'relative', width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <svg width={size} height={size} style={{ position: 'absolute', top: 0, left: 0, transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={dash} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)' }} />
      </svg>
      <div style={{ position: 'relative', zIndex: 1, textAlign: 'center' }}>{children}</div>
    </div>
  );
};

const Card = ({ children, className = '', style = {}, hover = true }) => (
  <div className={`${hover ? 'card-hover' : ''} ${className}`}
    style={{ background: '#fff', borderRadius: 16, border: '1px solid #E9EEF4', boxShadow: '0 1px 4px rgba(0,0,0,.05)', overflow: 'hidden', ...style }}>
    {children}
  </div>
);

const SectionHeader = ({ title, subtitle, action }) => (
  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20, gap: 12 }}>
    <div>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: '#111827', letterSpacing: '-.3px' }}>{title}</h2>
      {subtitle && <p style={{ fontSize: 13, color: C.gray, marginTop: 3 }}>{subtitle}</p>}
    </div>
    {action}
  </div>
);

const TopBar = ({ title, subtitle, right }) => (
  <div style={{ background: '#fff', borderBottom: '1px solid #E9EEF4', padding: '14px 28px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 20, boxShadow: '0 1px 3px rgba(0,0,0,.04)' }}>
    <div>
      <div style={{ fontSize: 17, fontWeight: 800, color: '#111827', letterSpacing: '-.2px' }}>{title}</div>
      {subtitle && <div style={{ fontSize: 12, color: C.gray, marginTop: 1 }}>{subtitle}</div>}
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      {right}
      <button style={{ position: 'relative', width: 36, height: 36, borderRadius: 10, background: '#F8FAFC', border: '1px solid #E9EEF4', display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.gray, cursor: 'pointer' }} className="btn">
        {Ico.Bell}
        <span style={{ position: 'absolute', top: 7, right: 7, width: 7, height: 7, borderRadius: '50%', background: '#EF4444', border: '1.5px solid #fff' }} />
      </button>
      <Avatar initials="MR" size={36} bg={C.teal} textSize={12} />
    </div>
  </div>
);

/* ══════════════════════ SIDEBAR ══════════════════════ */
const NAV = [
  { id: 'dashboard',   label: 'Dashboard',     icon: Ico.Home   },
  { id: 'careermap',   label: 'Career Map',     icon: Ico.Map    },
  { id: 'modules',     label: 'Learning',       icon: Ico.Book   },
  { id: 'credentials', label: 'Credentials',    icon: Ico.Shield },
  { id: 'jobs',        label: 'Job Matches',    icon: Ico.Brief  },
];
const NAV_BOTTOM = [
  { id: 'profile',  label: 'Profile',  icon: Ico.Person },
  { id: 'settings', label: 'Settings', icon: Ico.Gear   },
];

function Sidebar({ active, onNav }) {
  return (
    <div style={{ width: 232, minHeight: '100vh', background: C.navy, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>

      {/* Brand */}
      <div style={{ padding: '20px 18px 16px', borderBottom: '1px solid rgba(255,255,255,.08)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: C.teal, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, color: '#fff', fontSize: 13, letterSpacing: '-.5px', flexShrink: 0 }}>SB</div>
          <div>
            <div style={{ color: '#fff', fontWeight: 900, fontSize: 15, letterSpacing: '-.3px', lineHeight: 1 }}>SkillBridge</div>
            <div style={{ color: C.teal, fontSize: 9, fontWeight: 800, letterSpacing: '1.8px', marginTop: 2 }}>PHILIPPINES</div>
          </div>
        </div>
      </div>

      {/* User card */}
      <div style={{ padding: '14px 14px 12px', borderBottom: '1px solid rgba(255,255,255,.08)' }}>
        <div style={{ background: 'rgba(255,255,255,.07)', borderRadius: 12, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <Avatar initials="MR" size={36} bg={C.teal} textSize={12} />
          <div style={{ minWidth: 0 }}>
            <div style={{ color: '#fff', fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>Maria Reyes</div>
            <div style={{ color: '#93C5FD', fontSize: 11, marginTop: 1 }}>Customer Service · L3</div>
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
            <div style={{ background: C.teal, borderRadius: 6, padding: '1px 6px', color: '#fff', fontSize: 9, fontWeight: 800, letterSpacing: '.5px' }}>35% ↑</div>
          </div>
        </div>
      </div>

      {/* Main nav */}
      <nav style={{ flex: 1, padding: '10px 10px' }}>
        {NAV.map(n => {
          const on = active === n.id;
          return (
            <button key={n.id} onClick={() => onNav(n.id)} className="sidebar-item"
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 10, marginBottom: 2, cursor: 'pointer', border: 'none', textAlign: 'left', background: on ? 'rgba(29,158,117,.25)' : 'transparent', color: on ? '#fff' : 'rgba(255,255,255,.6)', fontWeight: on ? 700 : 500, fontSize: 13, fontFamily: 'inherit', position: 'relative' }}>
              <span style={{ color: on ? C.teal : 'rgba(255,255,255,.5)', flexShrink: 0 }}>{n.icon}</span>
              {n.label}
              {on && <span style={{ position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)', width: 3, height: 18, borderRadius: '0 3px 3px 0', background: C.teal }} />}
            </button>
          );
        })}
      </nav>

      {/* Bottom nav */}
      <div style={{ padding: '8px 10px 6px', borderTop: '1px solid rgba(255,255,255,.08)' }}>
        {NAV_BOTTOM.map(n => {
          const on = active === n.id;
          return (
            <button key={n.id} onClick={() => onNav(n.id)} className="sidebar-item"
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', borderRadius: 10, marginBottom: 2, cursor: 'pointer', border: 'none', textAlign: 'left', background: on ? 'rgba(29,158,117,.2)' : 'transparent', color: on ? '#fff' : 'rgba(255,255,255,.5)', fontWeight: 500, fontSize: 13, fontFamily: 'inherit' }}>
              <span style={{ color: on ? C.teal : 'rgba(255,255,255,.4)' }}>{n.icon}</span>
              {n.label}
            </button>
          );
        })}
        {/* XP strip */}
        <div style={{ marginTop: 10, padding: '10px 10px 12px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', color: 'rgba(255,255,255,.45)', fontSize: 10, marginBottom: 5 }}>
            <span>280 XP earned</span><span>500 XP goal</span>
          </div>
          <Bar pct={56} color={C.teal} height={4} bg="rgba(255,255,255,.12)" />
          <div style={{ color: 'rgba(255,255,255,.25)', fontSize: 9, marginTop: 8, textAlign: 'center', letterSpacing: '.5px' }}>TESDA ACCREDITED PARTNER</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════ SCREEN 1 — DASHBOARD ══════════════════════ */
const COMPETENCIES = [
  { name: 'Communication',  pct: 88, color: C.teal },
  { name: 'SQL',            pct: 42, color: C.sky  },
  { name: 'Python',         pct: 28, color: '#8B5CF6' },
  { name: 'Data Analytics', pct: 38, color: '#F59E0B' },
  { name: 'Cybersecurity',  pct: 15, color: '#EF4444' },
];

function Dashboard() {
  return (
    <div className="fade-in">
      <TopBar title="Dashboard" subtitle="Martes, Abril 1, 2026" />

      <div style={{ padding: '24px 28px', maxWidth: 1080 }}>
